<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIAZE — Photography</title>
    <meta name="description" content="Jiaze Photography Portfolio">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Grain Overlay -->
    <div class="grain-overlay"></div>

    <!-- Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Hero Section -->
    <section class="hero" id="hero">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-content">
            <div class="hero-top-line">
                <span class="hero-line-left"></span>
                <span class="hero-year">EST. 2024</span>
                <span class="hero-line-right"></span>
            </div>
            <div class="hero-badge">
                <span class="badge-dot"></span>
                <span>ON DISPLAY</span>
            </div>
            <h1 class="hero-title">
                <span class="title-j">JIAZE</span>
            </h1>
            <p class="hero-subtitle">P H O T O G R A P H Y</p>
            <div class="hero-divider">
                <span class="divider-dot"></span>
            </div>
            <div class="hero-quote">"用光影记录世界的每一个瞬间"</div>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number" id="statPhotos">0</span>
                    <span class="stat-label">PHOTOS</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" id="statAlbums">0</span>
                    <span class="stat-label">ALBUMS</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" id="statCameras">0</span>
                    <span class="stat-label">CAMERAS</span>
                </div>
            </div>
            <div class="hero-scroll" id="heroScroll">
                <span>SCROLL</span>
                <div class="scroll-line"></div>
            </div>
        </div>
    </section>

    <!-- Header -->
    <header class="header" id="header">
        <div class="header-inner">
            <div class="header-left">
                <a href="#" class="site-logo" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">
                    <span class="logo-dot"></span>
                    <span class="logo-text">JIAZE</span>
                </a>
            </div>
            <nav class="header-center">
                <div class="album-nav" id="albumNav">{{ALBUMS}}</div>
            </nav>
            <div class="header-right">
                <span class="photo-count-header" id="photoCountHeader">{{PHOTO_COUNT}} 张</span>

            </div>
        </div>
    </header>

    <!-- Gallery Section -->
    <section class="gallery-section" id="gallerySection">
        <div class="section-header">
            <h2 class="section-title">
                <span class="title-red-dot"></span>
                全部作品
            </h2>
            <div class="view-toggle">
                <button class="view-btn active" data-view="masonry" aria-label="瀑布流">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="1" y="1" width="10" height="14" rx="1"/><rect x="13" y="1" width="10" height="8" rx="1"/><rect x="13" y="11" width="10" height="12" rx="1"/><rect x="1" y="17" width="10" height="6" rx="1"/>
                    </svg>
                </button>
                <button class="view-btn" data-view="grid" aria-label="网格">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="1" y="1" width="10" height="10" rx="1"/><rect x="13" y="1" width="10" height="10" rx="1"/><rect x="1" y="13" width="10" height="10" rx="1"/><rect x="13" y="13" width="10" height="10" rx="1"/>
                    </svg>
                </button>
            </div>
        </div>

        <main class="gallery" id="gallery">
            {{GALLERY_ITEMS}}
        </main>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-backdrop"></div>
        <div class="lightbox-container">
            <div class="lightbox-image-wrap">
                <div class="lightbox-loader">
                    <div class="loader-ring"></div>
                </div>
                <img class="lightbox-img" id="lightboxImg" src="" alt="">
                <div class="lightbox-caption" id="lightboxCaption"></div>
            </div>
            <!-- Lightbox Top Bar -->
            <div class="lightbox-topbar">
                <div class="lightbox-counter" id="lbCounter"></div>
                <button class="lightbox-close" id="lightboxClose" aria-label="关闭">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <!-- Lightbox Nav -->
            <button class="lightbox-nav lightbox-nav-prev" id="lbPrev" aria-label="上一张">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
            <button class="lightbox-nav lightbox-nav-next" id="lbNext" aria-label="下一张">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop" aria-label="回到顶部">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="18 15 12 9 6 15"/>
        </svg>
    </button>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="footer-dot"></span>
                <span class="footer-logo">JIAZE</span>
                <span class="footer-tagline">PHOTOGRAPHY</span>
            </div>
            <div class="footer-meta">
                <span>构建于 {{BUILD_TIME}}</span>
                <span class="footer-sep">·</span>
                <span>STATIC GALLERY</span>
            </div>
        </div>
    </footer>

    <script>
        window.__PHOTO_DATA__ = {{PHOTO_DATA}};
    </script>
    <script src="/app.js"></script>
</body>
</html>
