<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影集</title>
    <meta name="description" content="极简摄影展示网站">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Grain Overlay -->
    <div class="grain-overlay"></div>

    <!-- Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Hero Section -->
    <section class="hero" id="hero">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-content">
            <div class="hero-badge">
                <span class="badge-dot"></span>
                <span>正在展出</span>
            </div>
            <h1 class="hero-title">
                <span class="title-line" data-delay="0">摄</span>
                <span class="title-line" data-delay="1">影</span>
                <span class="title-line" data-delay="2">集</span>
            </h1>
            <p class="hero-subtitle">用光影记录世界的每一个瞬间</p>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number" id="statPhotos">0</span>
                    <span class="stat-label">张照片</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" id="statAlbums">0</span>
                    <span class="stat-label">个相册</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" id="statCameras">0</span>
                    <span class="stat-label">台相机</span>
                </div>
            </div>
            <div class="hero-scroll" id="heroScroll">
                <span>向下浏览</span>
                <div class="scroll-arrow">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </div>
            </div>
        </div>
    </section>

    <!-- Header -->
    <header class="header" id="header">
        <div class="header-inner">
            <div class="header-left">
                <a href="#" class="site-logo" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">
                    <span class="logo-icon">◈</span>
                    <span class="logo-text">摄影集</span>
                </a>
            </div>
            <nav class="header-center">
                <div class="album-nav" id="albumNav">{{ALBUMS}}</div>
            </nav>
            <div class="header-right">
                <span class="photo-count-header" id="photoCountHeader">{{PHOTO_COUNT}} 张照片</span>
                <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                    <div class="toggle-track">
                        <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                        </svg>
                        <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </div>
                </button>
            </div>
        </div>
    </header>

    <!-- Gallery Section -->
    <section class="gallery-section" id="gallerySection">
        <div class="section-header">
            <h2 class="section-title">
                <span class="title-accent">◈</span>
                全部作品
            </h2>
            <div class="view-toggle">
                <button class="view-btn active" data-view="masonry" aria-label="瀑布流">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="1" y="1" width="10" height="14" rx="1"/><rect x="13" y="1" width="10" height="8" rx="1"/><rect x="13" y="11" width="10" height="12" rx="1"/><rect x="1" y="17" width="10" height="6" rx="1"/>
                    </svg>
                </button>
                <button class="view-btn" data-view="grid" aria-label="网格">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="1" y="1" width="10" height="10" rx="1"/><rect x="13" y="1" width="10" height="10" rx="1"/><rect x="1" y="13" width="10" height="10" rx="1"/><rect x="13" y="13" width="10" height="10" rx="1"/>
                    </svg>
                </button>
            </div>
        </div>

        <main class="gallery" id="gallery">
            {{GALLERY_ITEMS}}
        </main>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-backdrop"></div>
        <div class="lightbox-container">
            <div class="lightbox-image-wrap">
                <div class="lightbox-loader">
                    <div class="loader-ring"></div>
                </div>
                <img class="lightbox-img" id="lightboxImg" src="" alt="">
                <div class="lightbox-caption" id="lightboxCaption"></div>
            </div>
            <aside class="lightbox-sidebar" id="lightboxSidebar">
                <div class="sidebar-header">
                    <div class="sidebar-filename" id="lbFilename"></div>
                    <button class="lightbox-close" id="lightboxClose" aria-label="关闭">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>

                <div class="sidebar-section">
                    <div class="section-label">拍摄信息</div>
                    <div class="info-grid">
                        <div class="info-row" id="lbDate">
                            <span class="info-icon">📅</span>
                            <span class="info-label">日期</span>
                            <span class="info-value"></span>
                        </div>
                        <div class="info-row" id="lbAlbum">
                            <span class="info-icon">📁</span>
                            <span class="info-label">相册</span>
                            <span class="info-value"></span>
                        </div>
                        <div class="info-row" id="lbCamera">
                            <span class="info-icon">📷</span>
                            <span class="info-label">机身</span>
                            <span class="info-value"></span>
                        </div>
                        <div class="info-row" id="lbLens">
                            <span class="info-icon">🔭</span>
                            <span class="info-label">镜头</span>
                            <span class="info-value"></span>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="section-label">拍摄参数</div>
                    <div class="exif-cards">
                        <div class="exif-card" id="lbAperture">
                            <div class="exif-card-icon">◎</div>
                            <div class="exif-card-label">光圈</div>
                            <div class="exif-card-value"></div>
                        </div>
                        <div class="exif-card" id="lbShutter">
                            <div class="exif-card-icon">⏱</div>
                            <div class="exif-card-label">快门</div>
                            <div class="exif-card-value"></div>
                        </div>
                        <div class="exif-card" id="lbISO">
                            <div class="exif-card-icon">☀</div>
                            <div class="exif-card-label">感光度</div>
                            <div class="exif-card-value"></div>
                        </div>
                        <div class="exif-card" id="lbFocal">
                            <div class="exif-card-icon">⊕</div>
                            <div class="exif-card-label">焦距</div>
                            <div class="exif-card-value"></div>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section" id="lbDimensions">
                    <div class="section-label">文件信息</div>
                    <div class="file-info">
                        <span class="file-info-item" id="lbSize"></span>
                    </div>
                </div>

                <div class="sidebar-nav">
                    <button class="nav-btn" id="lbPrev" aria-label="上一张">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                    <div class="nav-progress">
                        <div class="progress-bar" id="lbProgress"></div>
                    </div>
                    <button class="nav-btn" id="lbNext" aria-label="下一张">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </button>
                </div>
            </aside>
        </div>
    </div>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop" aria-label="回到顶部">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="18 15 12 9 6 15"/>
        </svg>
    </button>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="footer-logo">◈ 摄影集</span>
                <span class="footer-tagline">光影之间</span>
            </div>
            <div class="footer-meta">
                <span>构建于 {{BUILD_TIME}}</span>
                <span class="footer-sep">·</span>
                <span>静态生成</span>
            </div>
        </div>
    </footer>

    <script>
        window.__PHOTO_DATA__ = {{PHOTO_DATA}};
    </script>
    <script src="/app.js"></script>
</body>
</html>
