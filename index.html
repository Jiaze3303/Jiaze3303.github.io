<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影集</title>
    <meta name="description" content="极简摄影展示网站">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="header-left">
                <h1 class="site-title">摄影集</h1>
                <span class="photo-count">{{PHOTO_COUNT}} 张照片</span>
            </div>
            <nav class="header-right">
                <div class="album-nav">{{ALBUMS}}</div>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </nav>
        </div>
    </header>

    <!-- Gallery Grid -->
    <main class="gallery" id="gallery">
        {{GALLERY_ITEMS}}
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-backdrop"></div>
        <div class="lightbox-container">
            <div class="lightbox-image-wrap">
                <img class="lightbox-img" id="lightboxImg" src="" alt="">
            </div>
            <aside class="lightbox-sidebar" id="lightboxSidebar">
                <div class="sidebar-header">
                    <h3 class="sidebar-title" id="lbFilename"></h3>
                    <button class="lightbox-close" id="lightboxClose" aria-label="Close">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div class="sidebar-meta">
                    <div class="meta-row" id="lbDate">
                        <span class="meta-icon">📅</span>
                        <span class="meta-value"></span>
                    </div>
                    <div class="meta-row" id="lbAlbum">
                        <span class="meta-icon">📁</span>
                        <span class="meta-value"></span>
                    </div>
                    <div class="meta-row" id="lbCamera">
                        <span class="meta-icon">📷</span>
                        <span class="meta-value"></span>
                    </div>
                    <div class="meta-row" id="lbLens">
                        <span class="meta-icon">🔭</span>
                        <span class="meta-value"></span>
                    </div>
                </div>
                <div class="sidebar-exif">
                    <div class="exif-grid">
                        <div class="exif-item" id="lbAperture">
                            <span class="exif-label">光圈</span>
                            <span class="exif-value"></span>
                        </div>
                        <div class="exif-item" id="lbShutter">
                            <span class="exif-label">快门</span>
                            <span class="exif-value"></span>
                        </div>
                        <div class="exif-item" id="lbISO">
                            <span class="exif-label">ISO</span>
                            <span class="exif-value"></span>
                        </div>
                        <div class="exif-item" id="lbFocal">
                            <span class="exif-label">焦距</span>
                            <span class="exif-value"></span>
                        </div>
                    </div>
                </div>
                <div class="sidebar-nav">
                    <button class="nav-btn" id="lbPrev" aria-label="Previous">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                    <span class="nav-counter" id="lbCounter"></span>
                    <button class="nav-btn" id="lbNext" aria-label="Next">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </button>
                </div>
            </aside>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <span>构建于 {{BUILD_TIME}}</span>
    </footer>

    <script>
        window.__PHOTO_DATA__ = {{PHOTO_DATA}};
    </script>
    <script src="/app.js"></script>
</body>
</html>
